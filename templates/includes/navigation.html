
  {% load static %}
  <div class="container position-sticky z-index-sticky top-0">
    <div class="row">
      <div class="col-12">
        <nav class="navbar navbar-expand-lg blur blur-rounded top-0 z-index-fixed shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
  <div class="container-fluid">
    <a class="navbar-brand font-weight-bolder ms-sm-3" 
       href="/" rel="tooltip" title="Designed and Coded by Sergio" data-placement="bottom">
      Neighborhood Portal
    </a>
    <button class="navbar-toggler shadow-none ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navigation" aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon mt-2">
        <span class="navbar-toggler-bar bar1"></span>
        <span class="navbar-toggler-bar bar2"></span>
        <span class="navbar-toggler-bar bar3"></span>
      </span>
    </button>
    <div class="collapse navbar-collapse pt-3 pb-2 py-lg-0" id="navigation">
      <ul class="navbar-nav navbar-nav-hover ms-lg-12 ps-lg-5 w-100">
        
        <!-- Ваши новые основные ссылки -->
        <li class="nav-item mx-2">
          <a class="nav-link ps-2 cursor-pointer align-items-center" href="{% url 'neighborhood:index' %}">
            Home
          </a>
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link ps-2 cursor-pointer align-items-center" href="{% url 'users:user-list' %}">
            All neighbors
          </a>
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link ps-2 cursor-pointer align-items-center" href="{% url 'neighborhood:district-list' %}">
            All districts
          </a>
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link ps-2 cursor-pointer align-items-center" href="{% url 'posts:post-list' %}">
            All posts
          </a>
        </li>

        {% if user.is_authenticated %}
          <li class="nav-item ms-lg-auto d-flex align-items-center">
            <a class="nav-link me-2 mb-0" href="{{ request.user.get_absolute_url }}">
              {{ request.user.get_username }}
            </a>
            <form action="{% url "logout" %}" method="post" class="m-0 d-flex align-items-center">
              {% csrf_token %}
              <button type="submit" class="nav-link bg-transparent border-0 mb-0 text-uppercase" style="cursor: pointer;">
                LOGOUT
              </button>
            </form>
          </li>
        {% else %}
          <li class="nav-item ms-lg-auto d-flex align-items-center">
            <a class="navbar-brand font-weight-bolder ms-sm-3" href="{% url 'login' %}?next={{request.path}}">Login</a>
            <a class="navbar-brand font-weight-bolder ms-sm-3" href="{% url 'users:user-create' %}">Registration</a>
          </li>
        {% endif %}
        
      </ul>
    </div>
  </div>
</nav>
<!-- End Navbar -->
      </div>
    </div>
  </div>
